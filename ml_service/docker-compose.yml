services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pouchai_postgres
    environment:
      POSTGRES_DB: pouchai
      POSTGRES_USER: pouchai
      POSTGRES_PASSWORD: pouchai123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pouchai -d pouchai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
